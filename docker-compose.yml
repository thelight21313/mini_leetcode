services:
  django-app:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_HOST=database
      - DB_NAME=dbname
      - DB_USER=dbuser
      - DB_PASS=pasSNpos#12
    env_file:
      - .env
    depends_on:
      - database

  database:
    image: postgres:14.6
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=dbname
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=pasSNpos#12

  redis:
    image: redis:7.2
    hostname: redis

  worker:
    build:
      context: .
    hostname: worker1
    entrypoint: celery
    command: -A leet_code worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - database
    environment:
      - DB_HOST=database
      - DB_NAME=dbname
      - DB_USER=dbuser
      - DB_PASS=pasSNpos#12

  flower:
    build:
      context: .
    hostname: flower
    entrypoint: celery
    command: -A leet_code flower
    volumes:
      - .:/app
    links:
      - redis
    depends_on:
      - redis
    ports:
      - '5555:5555'

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - static_static:/app/staticfiles:ro
      - ./frontend:/usr/share/nginx/html:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - django-app

  judge0:
    image: judge0/judge0:1.13.0
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "2358:2358"
    privileged: true
    depends_on:
      - judge0-workers
      - judge0-db
      - judge0-redis

  judge0-workers:
    image: judge0/judge0:1.13.0
    command: [ "./scripts/workers" ]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-db
      - judge0-redis

  judge0-db:
    image: postgres:14.6
    volumes:
      - judge0_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=judge0
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=judge0pass

  judge0-redis:
    image: redis:7.2

volumes:
  static_static:
  postgres_data:
  judge0_postgres_data:
