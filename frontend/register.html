<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Регистрация — CodeArena</title>
  <link rel="icon" href="/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0f;
      --surface: #111118;
      --surface2:#1a1a24;
      --border:  #2a2a3a;
      --accent:  #7c6aff;
      --red:     #f87171;
      --green:   #4ade80;
      --text:    #e8e8f0;
      --muted:   #6b6b8a;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,255,0.1) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      animation: cardIn 0.4s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2rem;
    }

    .logo span { color: var(--accent); }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .field { margin-bottom: 1rem; }

    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }

    .input-wrap { position: relative; }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.7rem 1rem;
      border-radius: 7px;
      font-family: var(--mono);
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.12);
    }

    input.error { border-color: var(--red); }
    input.valid { border-color: var(--green); }

    .field-icon {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
      pointer-events: none;
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--red);
      margin-top: 0.35rem;
      display: none;
    }

    .error-msg.show { display: block; }

    .global-error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 7px;
      padding: 0.7rem 1rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--red);
      margin-bottom: 1.25rem;
      display: none;
    }

    .global-error.show { display: block; }

    /* strength bar */
    .strength-wrap {
      margin-top: 0.5rem;
      display: none;
    }

    .strength-wrap.show { display: block; }

    .strength-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.3rem;
    }

    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .strength-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.75rem;
      border-radius: 7px;
      font-family: var(--sans);
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      letter-spacing: 0.02em;
    }

    .submit-btn:hover    { background: #6a58f0; }
    .submit-btn:active   { transform: scale(0.98); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.72rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .footer-link {
      text-align: center;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .footer-link a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 700;
    }

    .footer-link a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <a class="logo" href="/index.html"><span>//</span> CodeArena</a>

  <h1>Регистрация</h1>
  <p class="subtitle">// создай аккаунт</p>

  <div class="global-error" id="globalError"></div>

  <div class="field">
    <label for="username">Имя пользователя</label>
    <div class="input-wrap">
      <input type="text" id="username" placeholder="coolcoder" autocomplete="username"
             oninput="validateUsername()"/>
      <span class="field-icon" id="usernameIcon"></span>
    </div>
    <div class="error-msg" id="usernameError"></div>
  </div>

  <div class="field">
    <label for="email">Email</label>
    <div class="input-wrap">
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"
             oninput="validateEmail()"/>
      <span class="field-icon" id="emailIcon"></span>
    </div>
    <div class="error-msg" id="emailError"></div>
  </div>

  <div class="field">
    <label for="password">Пароль</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"
             oninput="validatePassword()"/>
    </div>
    <div class="strength-wrap" id="strengthWrap">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="error-msg" id="passwordError"></div>
  </div>

  <div class="field">
    <label for="password2">Повтори пароль</label>
    <div class="input-wrap">
      <input type="password" id="password2" placeholder="••••••••" autocomplete="new-password"
             oninput="validatePassword2()"/>
      <span class="field-icon" id="password2Icon"></span>
    </div>
    <div class="error-msg" id="password2Error"></div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="handleRegister()">Создать аккаунт</button>

  <div class="divider">или</div>

  <div class="footer-link">
    Уже есть аккаунт? <a href="/login.html">Войти</a>
  </div>
</div>

<script>
  const API = '/api'

  if (localStorage.getItem('access_token')) {
    window.location.href = '/problems.html'
  }

  // ── Валидация полей ──
  function setFieldState(id, state, msg) {
    const input = document.getElementById(id)
    const errEl = document.getElementById(id + 'Error')
    const icon  = document.getElementById(id + 'Icon')

    input.classList.remove('error', 'valid')
    if (errEl) { errEl.textContent = ''; errEl.classList.remove('show') }
    if (icon)  icon.textContent = ''

    if (state === 'error') {
      input.classList.add('error')
      if (errEl) { errEl.textContent = msg; errEl.classList.add('show') }
      if (icon)  icon.textContent = '✗'
    } else if (state === 'valid') {
      input.classList.add('valid')
      if (icon) icon.textContent = '✓'
    }
  }

  function validateUsername() {
    const val = document.getElementById('username').value.trim()
    if (!val) return setFieldState('username', '', '')
    if (val.length < 3) return setFieldState('username', 'error', 'Минимум 3 символа')
    if (!/^[a-zA-Z0-9_]+$/.test(val)) return setFieldState('username', 'error', 'Только латиница, цифры и _')
    setFieldState('username', 'valid', '')
    return true
  }

  function validateEmail() {
    const val = document.getElementById('email').value.trim()
    if (!val) return setFieldState('email', '', '')
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) return setFieldState('email', 'error', 'Некорректный email')
    setFieldState('email', 'valid', '')
    return true
  }

  function validatePassword() {
    const val = document.getElementById('password').value
    const wrap = document.getElementById('strengthWrap')

    if (!val) { wrap.classList.remove('show'); return }
    wrap.classList.add('show')

    const strength = getStrength(val)
    const fill  = document.getElementById('strengthFill')
    const label = document.getElementById('strengthLabel')
    const colors = ['#f87171', '#fbbf24', '#4ade80']
    const labels = ['Слабый', 'Средний', 'Сильный']
    const widths = ['33%', '66%', '100%']

    fill.style.width      = widths[strength]
    fill.style.background = colors[strength]
    label.textContent     = labels[strength]
    label.style.color     = colors[strength]

    if (val.length < 8) return setFieldState('password', 'error', 'Минимум 8 символов')
    setFieldState('password', 'valid', '')

    // перевалидируем повтор если уже заполнен
    if (document.getElementById('password2').value) validatePassword2()
    return true
  }

  function getStrength(pwd) {
    let score = 0
    if (pwd.length >= 8)  score++
    if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++
    if (/[0-9]/.test(pwd) || /[^a-zA-Z0-9]/.test(pwd)) score++
    return Math.min(score - 1, 2)
  }

  function validatePassword2() {
    const p1 = document.getElementById('password').value
    const p2 = document.getElementById('password2').value
    if (!p2) return setFieldState('password2', '', '')
    if (p1 !== p2) return setFieldState('password2', 'error', 'Пароли не совпадают')
    setFieldState('password2', 'valid', '')
    return true
  }

  // ── Сабмит ──
  function setLoading(on) {
    const btn = document.getElementById('submitBtn')
    btn.disabled = on
    btn.innerHTML = on ? '<span class="spinner"></span>Создаём аккаунт...' : 'Создать аккаунт'
  }

  function clearGlobalError() {
    document.getElementById('globalError').classList.remove('show')
  }

  function showGlobalError(msg) {
    const el = document.getElementById('globalError')
    el.textContent = msg
    el.classList.add('show')
  }

  async function handleRegister() {
    clearGlobalError()

    const username  = document.getElementById('username').value.trim()
    const email     = document.getElementById('email').value.trim()
    const password  = document.getElementById('password').value
    const password2 = document.getElementById('password2').value

    // финальная валидация перед отправкой
    let valid = true
    if (!username) { setFieldState('username', 'error', 'Обязательное поле'); valid = false }
    else if (!validateUsername()) valid = false

    if (!email) { setFieldState('email', 'error', 'Обязательное поле'); valid = false }
    else if (!validateEmail()) valid = false

    if (!password) { setFieldState('password', 'error', 'Обязательное поле'); valid = false }
    else if (password.length < 8) { setFieldState('password', 'error', 'Минимум 8 символов'); valid = false }

    if (!password2) { setFieldState('password2', 'error', 'Повтори пароль'); valid = false }
    else if (password !== password2) { setFieldState('password2', 'error', 'Пароли не совпадают'); valid = false }

    if (!valid) return

    setLoading(true)

    try {
      const res = await fetch(`${API}/auth/registration/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password1: password, password2: password }),
      })

      const data = await res.json()

      if (!res.ok) {
        // DRF возвращает ошибки по полям: { username: [...], email: [...], password: [...] }
        if (data.username) setFieldState('username', 'error', data.username[0])
        if (data.email)    setFieldState('email',    'error', data.email[0])
        if (data.password) setFieldState('password', 'error', data.password[0])
        if (data.detail)   showGlobalError(data.detail)
        return
      }

      // регистрация прошла — автологин
      const tokenRes = await fetch(`${API}/token/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      })

      const tokenData = await tokenRes.json()
      if (tokenRes.ok) {
        localStorage.setItem('access_token',  tokenData.access)
        localStorage.setItem('refresh_token', tokenData.refresh)
        localStorage.setItem('username', username)
      }

      window.location.href = '/problems.html'

    } catch {
      showGlobalError('Нет связи с сервером')
    } finally {
      setLoading(false)
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRegister()
  })
</script>
</body>
</html>
