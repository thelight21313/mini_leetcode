# ── Rate limiting ──
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

# ── Gzip ──
gzip on;
gzip_types text/plain application/json application/javascript text/css text/xml;
gzip_min_length 1024;
gzip_vary on;


# ── HTTP → HTTPS ──
server {
    listen 80;
    server_name nenado-lit.ru www.nenado-lit.ru;
    return 301 https://$host$request_uri;
}

# ── HTTPS ──
server {
    listen 443 ssl;
    server_name nenado-lit.ru www.nenado-lit.ru;

    server_tokens off;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/nenado-lit.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nenado-lit.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──
    add_header X-Frame-Options        "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Django static ──
    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Django admin ──
    location /admin/ {
        proxy_pass http://django-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── API ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;
        error_page 429 @rate_limited;

        proxy_pass http://django-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── Login rate limit ──
    location = /api/auth/token/ {
        limit_req zone=login_limit burst=2 nodelay;
        limit_req_status 429;
        error_page 429 @rate_limited;

        proxy_pass http://django-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ── WebSocket ──
    location /ws/ {
        proxy_pass http://django-app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 86400;
    }

    # ── SPA frontend ──
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ── Static SPA pages ──
    location /problems/ {
        root /usr/share/nginx/html;
        try_files /problems.html =404;
    }

    location /contests/ {
        root /usr/share/nginx/html;
        try_files /contests.html =404;
    }

    # ── 429 handler ──
    location @rate_limited {
        default_type application/json;
        add_header Content-Type "application/json; charset=utf-8" always;
        add_header Retry-After 60 always;
        return 429 '{"detail":"Слишком много запросов. Подожди немного."}';
    }
}
